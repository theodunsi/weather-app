<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <form id="weather-form">
        <input id="search" type="search" placeholder="Search Your City...">
    </form>

    <div id="loading-state">
        <p class="h1">--</p>
    </div>

    <div id="main-content"> 
        <div id="header"> 
            <div id="high-low"> </div>
        </div>

        <div id="extra-info"> </div>
    </div>

    <button id="toggle" aria-pressed="false" style="display: none;"> Toggle </button>
</body>
</html>
